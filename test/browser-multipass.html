<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>html,body,#icosa-viewer{width:100%;height:100%;margin:0;background:#000}</style>
  <script type="importmap">
    {"imports":{
      "three":"https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/",
      "three/examples/":"https://cdn.jsdelivr.net/npm/three@0.172.0/examples/",
      "three-icosa":"/dist/three-icosa.module.js",
      "three-tiltloader":"https://cdn.jsdelivr.net/npm/three-tiltloader@0.4.2-alpha.4/dist/three-tiltloader.module.js",
      "@sparkjsdev/spark":"https://cdn.jsdelivr.net/gh/sparkjsdev/spark@b60e9d9acbe621e67eda5d98417fcfdea5af6291/dist/spark.module.js"
    }}
  </script>
</head>
<body>
  <div id="icosa-viewer"></div>
  <script type="module">
    import { Viewer } from "/dist/icosa-viewer.module.js";
    const assets = "https://cdn.jsdelivr.net/gh/icosa-foundation/icosa-sketch-assets@ba885b119d435fa591d2fe1c90feb14e39c432d5/";
    const viewer = new Viewer(assets);
    await viewer.loadGltf("/test/fixtures/tube-toon-inverted.gltf", false, {});
    const matches = [];
    const meshes = [];
    viewer.loadedModel.traverse((object) => {
      if (!object.isMesh) return;
      meshes.push({
        name: object.name,
        materialNames: (Array.isArray(object.material) ? object.material : [object.material]).map((material) => material?.name),
        materialCount: Array.isArray(object.material) ? object.material.length : 1,
        groups: object.geometry.groups.length,
      });
      if (!Array.isArray(object.material)) return;
      const passes = object.material;
      if (passes.some((material) => material.name === "material_TubeToonInverted")) {
        matches.push({
          passes: passes.map((material) => material.uniforms.u_TubeToonPass?.value),
          outlineSizes: passes.map((material) => material.uniforms.u_TubeToonOutlineSize?.value),
          groups: object.geometry.groups.map(({ start, count, materialIndex }) => ({ start, count, materialIndex })),
        });
      }
    });
    const passed = matches.length > 0 && matches.every((match) =>
      match.passes.length === 2 &&
      match.passes[0] === 1 && match.passes[1] === 2 &&
      match.outlineSizes[0] === 0.05 && match.outlineSizes[1] === 0.05 &&
      match.groups.length === 2 &&
      match.groups.every((group, index) => group.materialIndex === index && group.count > 0)
    );
    window.multipassResult = { passed, matches, meshes };
    document.documentElement.dataset.multipass = passed ? "pass" : "fail";
  </script>
</body>
</html>
