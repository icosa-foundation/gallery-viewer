<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gallery Viewer IMM integration</title>
  <link rel="stylesheet" href="/dist/css/style.css">
  <style>
    html, body, #icosa-viewer { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
  </style>
  <script type="importmap">
    {"imports":{
      "three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "three/examples/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/",
      "three-icosa":"/dist/three-icosa.module.js",
      "three-tiltloader":"https://cdn.jsdelivr.net/npm/three-tiltloader@0.4.2-alpha.4/dist/three-tiltloader.module.js",
      "@sparkjsdev/spark":"https://sparkjs.dev/releases/spark/2.1.0/spark.module.js",
      "@immersive-foundation/three-imm-loader":"/imm-library/imm-three-loader.js"
    }}
  </script>
</head>
<body>
  <div id="icosa-viewer"></div>
  <script type="module">
    import { Viewer } from "/dist/icosa-viewer.module.js";

    const frame = document.querySelector("#icosa-viewer");
    const cameraEvents = [];
    let immMetadata = null;
    frame.addEventListener("icosa-viewer-imm-camera", (event) => cameraEvents.push(event.detail));
    frame.addEventListener("icosa-viewer-imm-ready", (event) => {
      immMetadata = event.detail;
    });

    const viewer = new Viewer("https://icosa-foundation.github.io/icosa-sketch-assets/", frame);
    window.__galleryImm = { viewer, ready: false, cameraEvents, get metadata() { return immMetadata; } };
    await viewer.loadImm("/sample1.imm", {
      decoderWorkerURL: "/imm-decoder/imm-web-decoder-worker.mjs",
      audio: true,
    });
    window.__galleryImm.ready = true;

    window.__galleryImmDiagnostics = () => {
      const asset = viewer.immAsset;
      let paintMeshes = 0;
      asset?.scene.traverse((object) => { if (object.userData.immLayerType === "paint") paintMeshes++; });
      return {
        ready: window.__galleryImm.ready,
        timeSeconds: asset?.timeSeconds ?? 0,
        playing: asset?.playing ?? false,
        waiting: asset?.waiting ?? false,
        chapters: asset?.chapters.length ?? 0,
        viewpoints: asset?.viewpoints.map(({ id, name }) => ({ id, name })) ?? [],
        paintMeshes,
        sharedGalleryScene: asset?.scene.parent === viewer.contentRoot,
        cameraPosition: viewer.flatCamera.position.toArray(),
        cameraQuaternion: viewer.flatCamera.quaternion.toArray(),
        canvasClientWidth: viewer.canvas.clientWidth,
        canvasClientHeight: viewer.canvas.clientHeight,
        cameraEvents: [...cameraEvents],
        drawCalls: viewer.renderer.info.render.calls,
        triangles: viewer.renderer.info.render.triangles,
      };
    };
  </script>
</body>
</html>
