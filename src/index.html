<!doctype html>
<meta charset="utf-8">
<html>
<head>
    <title>.gltf/.glb Viewer | Icosa Viewer</title>
    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
            "three/examples/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/",
            "three-icosa": "https://cdn.jsdelivr.net/npm/three-icosa@0.4.2-alpha.18/dist/three-icosa.module.js",
            "three-tiltloader": "https://cdn.jsdelivr.net/npm/three-tiltloader@0.4.2-alpha.4/dist/three-tiltloader.module.js",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
          }
        }
    </script>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./viewer.ts" type="module"></script>
</head>
<body>
<script type="module">
    import { Viewer } from "./viewer.ts";
    let viewer = new Viewer("https://icosa-foundation.github.io/icosa-sketch-assets/");
    await viewer.loadGltf("formats/gltf2/all_brushes.glb", true);
</script>
<div id="icosa-viewer"></div>
</body>
</html>
